---
# Secrets for sensitive configuration
# IMPORTANT: Replace placeholder values with actual secrets
# Consider using external secret management (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: technova-secrets
  namespace: technova
  labels:
    app: technova
    environment: production
type: Opaque
stringData:
  # API Security
  API_KEY: "change-me-to-secure-random-string"
  API_KEY_HEADER: "X-API-Key"
  
  # Database Password
  DATABASE_PASSWORD: "change-me-to-secure-db-password"
  
  # OpenAI API Key
  OPENAI_API_KEY: "sk-change-me-to-your-openai-key"
  
  # Gmail API Credentials
  GMAIL_SERVICE_ACCOUNT_FILE: "/etc/secrets/gmail-service-account.json"
  
  # Twilio Credentials
  TWILIO_ACCOUNT_SID: "AC-change-me"
  TWILIO_AUTH_TOKEN: "change-me-to-twilio-token"
  TWILIO_WHATSAPP_NUMBER: "+14155238886"
  
  # Kafka Credentials (if using authenticated Kafka)
  KAFKA_USERNAME: "technova"
  KAFKA_PASSWORD: "change-me-to-kafka-password"
  
  # OAuth Credentials (if needed)
  OAUTH_CLIENT_ID: "change-me"
  OAUTH_CLIENT_SECRET: "change-me"
  
  # Encryption Key
  ENCRYPTION_KEY: "change-me-to-32-char-random-key"
  
  # CSRF Secret
  CSRF_SECRET: "change-me-to-random-csrf-secret"
  
  # Webhook Secrets
  TWILIO_WEBHOOK_SECRET: "change-me-to-twilio-webhook-secret"
  GMAIL_WEBHOOK_SECRET: "change-me-to-gmail-webhook-secret"

---
# Gmail Service Account Secret (separate for security)
apiVersion: v1
kind: Secret
metadata:
  name: gmail-service-account
  namespace: technova
  labels:
    app: technova
    component: gmail
type: Opaque
stringData:
  # This should be the actual service account JSON content
  # Download from Google Cloud Console
  gmail-service-account.json: |
    {
      "type": "service_account",
      "project_id": "your-gcp-project",
      "private_key_id": "key-id",
      "private_key": "-----BEGIN PRIVATE KEY-----\nCHANGE-ME\n-----END PRIVATE KEY-----\n",
      "client_email": "technova@your-project.iam.gserviceaccount.com",
      "client_id": "client-id",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token"
    }

---
# TLS Secret for Ingress
# Generate with: kubectl create secret tls technova-tls --cert=tls.crt --key=tls.key -n technova
apiVersion: v1
kind: Secret
metadata:
  name: technova-tls
  namespace: technova
  labels:
    app: technova
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and key
  # Replace with actual certificate data
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCkNISGFOR0UtTUUgVE8gWU9VUiBD RVJUSUZJQ0FURQotLS0tLUVORCBDRVJUSUZJQ0FURS0tLS0tCg==
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCkNISF9NRV9UT19ZT1VSX1BSSVZB VEVLRF9LRVkKLS0tLS1FTkQgUFJJVkFURSBLRVktLS0tLQo=
