---
# Network Policies
# Restrict traffic between pods

# Default deny all ingress traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: technova
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow API ingress from Ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: technova
spec:
  podSelector:
    matchLabels:
      app: support-api
  policyTypes:
    - Ingress
  ingress:
    # From Ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    
    # From within namespace (health checks)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8000

---
# Allow Worker to communicate with Kafka and Database
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-egress
  namespace: technova
spec:
  podSelector:
    matchLabels:
      app: support-worker
  policyTypes:
    - Egress
  egress:
    # To Kafka
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    
    # To PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    
    # To API (for agent communication)
    - to:
        - podSelector:
            matchLabels:
              app: support-api
      ports:
        - protocol: TCP
          port: 8000
    
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

---
# Allow API to communicate with Database and Kafka
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-egress
  namespace: technova
spec:
  podSelector:
    matchLabels:
      app: support-api
  policyTypes:
    - Egress
  egress:
    # To PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    
    # To Kafka
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

---
# Allow Database ingress from API and Worker
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  namespace: technova
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    # From API
    - from:
        - podSelector:
            matchLabels:
              app: support-api
      ports:
        - protocol: TCP
          port: 5432
    
    # From Worker
    - from:
        - podSelector:
            matchLabels:
              app: support-worker
      ports:
        - protocol: TCP
          port: 5432

---
# Allow Kafka ingress from API and Worker
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-ingress
  namespace: technova
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    # From API
    - from:
        - podSelector:
            matchLabels:
              app: support-api
      ports:
        - protocol: TCP
          port: 9092
    
    # From Worker
    - from:
        - podSelector:
            matchLabels:
              app: support-worker
      ports:
        - protocol: TCP
          port: 9092
