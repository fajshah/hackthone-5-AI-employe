---
# Service Account for TechNova pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: technova-service-account
  namespace: technova
  labels:
    app: technova
automountServiceAccountToken: false

---
# Role for basic pod operations
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: technova-role
  namespace: technova
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

---
# Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: technova-role-binding
  namespace: technova
subjects:
  - kind: ServiceAccount
    name: technova-service-account
    namespace: technova
roleRef:
  kind: Role
  name: technova-role
  apiGroup: rbac.authorization.k8s.io
