---
# Kafka Deployment (Single node for development)
# For production, use Kafka operator or managed Kafka (Confluent, MSK, etc.)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: technova
  labels:
    app: kafka
    component: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: kafka
              containerPort: 9092
              protocol: TCP
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka:9093"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CLUSTER_ID
              value: "technova-cluster-id"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          volumeMounts:
            - name: kafka-storage
              mountPath: /var/lib/kafka/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "kafka-broker-api-versions --bootstrap-server localhost:9092"
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "kafka-broker-api-versions --bootstrap-server localhost:9092"
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: kafka-storage
          emptyDir: {}
      securityContext:
        fsGroup: 1000

---
# Kafka Topic Creation Job
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topic-creator
  namespace: technova
  labels:
    app: kafka
    component: setup
spec:
  template:
    spec:
      containers:
        - name: kafka-topics
          image: confluentinc/cp-kafka:7.5.0
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Kafka to be ready..."
              sleep 30
              
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic channel-email --partitions 3 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic channel-whatsapp --partitions 3 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic channel-webform --partitions 3 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic agent-requests --partitions 3 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic agent-responses --partitions 3 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic agent-escalations --partitions 3 --replication-factor 1
              
              echo "Topics created successfully"
      restartPolicy: OnFailure
  backoffLimit: 3
