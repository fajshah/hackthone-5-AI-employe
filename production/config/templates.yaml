# Response Templates for Customer Success FTE
# This file defines response templates for different channels and scenarios
# Format: YAML

templates:
  # Email Templates
  email:
    greeting: "Dear {customer_name},"
    opening_acknowledgment: "Thank you for reaching out to TechNova Support regarding {topic}."
    closing: |
      If you have any further questions, please don't hesitate to reply to this email.
      
      Best regards,
      TechNova Support Team
    ticket_reference: "Ticket Reference: #{ticket_id}"
    signature: |
      Best regards,
      TechNova Support Team
      ---
      This response was generated by our AI assistant. For complex issues, you can request human support.
    
    scenarios:
      technical_support: |
        I understand you're experiencing issues with {issue}. Let me help you resolve this.
        
        Here's what I found:
        {solution}
        
        Next steps:
        {next_steps}
      
      billing_inquiry: |
        I completely understand your concern about the billing matter. Let me look into this for you.
        
        Here's the situation:
        {explanation}
        
        I'm escalating this to our Billing team who will review your account and respond within 2 hours.
      
      feature_inquiry: |
        Great question about {feature}! I'd be happy to help.
        
        Here's how it works:
        {explanation}
        
        You can find more details in our documentation at {doc_link}
      
      bug_report: |
        I'm sorry you're experiencing this issue. This doesn't sound like the experience we want for you.
        
        I've documented the details and filed this as a bug report. Our team will investigate:
        - Steps to reproduce: {steps}
        - Affected system: {system}
        
        We'll update you within 24 hours with a resolution timeline.

  # WhatsApp Templates
  whatsapp:
    greeting: "Hey {customer_name}! 👋"
    closing: "Need more help? Just reply! Or type 'human' for live support."
    max_length: 300
    
    scenarios:
      how_to: |
        Here's how to {action}:
        {steps}
        
        That's it! 😊
      
      quick_fix: |
        Got it! Try this:
        {solution}
        
        Let me know if that works! ✅
      
      escalation: |
        I understand this needs more attention. I'm connecting you with our support team who'll help you shortly. 🙏
      
      acknowledgment: |
        Got your message! Let me check on that for you... one sec! 👍

  # Web Form Templates
  web_form:
    greeting: "Hi {customer_name},"
    opening: "Thanks for contacting TechNova Support."
    closing: |
      Need more help? Reply to this message or visit our support portal at help.technova.com
      
      Best,
      TechNova Support
    signature: |
      Best,
      TechNova Support
    
    scenarios:
      general_inquiry: |
        Thanks for your question about {topic}.
        
        Here's what I found:
        {answer}
        
        You can also check our help center for more details: {doc_link}
      
      technical_issue: |
        I understand you're having trouble with {issue}. Let me help.
        
        Here's what to try:
        {steps}
        
        If the issue persists, please reply with:
        - Screenshots of the error
        - Your browser/device information
        - Steps to reproduce
        
        We'll prioritize this for you.
      
      feedback: |
        Thank you for sharing your feedback! We really appreciate it.
        
        I've logged your suggestion in our product feedback board. Our team reviews these weekly.
        
        Is there anything else we can help with?

  # Error/Fallback Templates
  error_responses:
    knowledge_base_unavailable: |
      I'm having trouble accessing our documentation right now. Let me connect you with someone who can help.
    database_error: |
      I'm experiencing technical difficulties. A team member will follow up shortly.
    channel_api_failure: |
      I'm sorry, I'm having trouble processing your request right now. A human agent will follow up within 30 minutes.
    timeout: |
      This is taking longer than expected. I've logged your request and our team will respond shortly.
    invalid_input: |
      Could you provide more details about {specific_aspect}? This will help me assist you better.

  # Sentiment-Based Adjustments
  sentiment_adjustments:
    positive:
      tone: "friendly, efficient"
      addition: "I'm glad to hear that! 😊"
    
    neutral:
      tone: "professional, helpful"
      addition: ""
    
    frustrated:
      tone: "empathetic, patient"
      addition: "I completely understand how frustrating this must be. Let me make this right for you."
    
    angry:
      tone: "apologetic, action-oriented"
      addition: "You're absolutely right to be concerned, and I sincerely apologize. I'm escalating this immediately to ensure it gets resolved."

  # Cross-Channel Continuity
  cross_channel:
    acknowledge_prior_contact: |
      I see you contacted us previously about {previous_topic}. Let me help you further with that.
    
    channel_switch_detected: |
      I notice you've switched from {old_channel} to {new_channel}. No problem - I have your conversation history and can continue helping you.
    
    returning_customer: |
      Welcome back, {customer_name}! I can see you've contacted us {count} times before. How can I help you today?

  # Expectation Setting
  response_time_expectations:
    email: "You'll hear back within 24 hours"
    whatsapp: "I'll check and get back to you in a few minutes"
    web_form: "We typically respond within 4 hours"
  
  delay_update: |
    Hi {customer_name}, just wanted to update you that we're still working on this.
    Our team needs a bit more time to investigate. I'll have an answer by {specific_time}.
    Thanks for your patience! 🙏

  # Retention-Specific (for cancellation requests)
  retention:
    acknowledge: |
      I'm sorry to hear you're considering cancellation. I understand {reason} is challenging.
    
    offer_alternatives: |
      Before we proceed, I want to mention:
      - We offer a "Data Archive" plan at $29/month for read-only access
      - You can export all your data anytime before cancellation
      - If you resubscribe within 6 months, we can restore your data
    
    respect_decision: |
      If you'd like to proceed with cancellation, I can help with that too. Just let me know.
      Either way, thank you for being part of TechNova.
