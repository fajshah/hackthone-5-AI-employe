## Response Template Configuration

```yaml
templates:
  email-tech-neutral:
    channel: email
    category: technical-integration
    sentiment_range: [-0.3, 0.3]
    word_count: [150, 300]
    tone: professional
    structure:
      - greeting
      - acknowledgment
      - solution_steps
      - additional_context
      - follow_up_offer
      - sign_off

  email-billing-frustrated:
    channel: email
    category: billing
    sentiment_range: [-0.7, -0.3]
    word_count: [150, 250]
    tone: empathetic
    structure:
      - greeting
      - empathy_statement
      - apology
      - action_items
      - timeline
      - reference_info
      - personal_monitoring_promise
      - sign_off

  whatsapp-howto-neutral:
    channel: whatsapp
    category: how-to
    sentiment_range: [-0.3, 0.3]
    word_count: [20, 60]
    tone: casual
    structure:
      - greeting_with_emoji
      - numbered_steps (1-3)
      - offer_help
      - closing_emoji

  whatsapp-bug-angry:
    channel: whatsapp
    category: bug-report
    sentiment_range: [-1.0, -0.7]
    word_count: [30, 70]
    tone: empathetic_urgent
    structure:
      - empathy_statement
      - urgency_acknowledgment
      - update_promise_with_timeline
      - optional_workaround
      - closing_emoji

  webform-tech-neutral:
    channel: webform
    category: technical-integration
    sentiment_range: [-0.3, 0.3]
    word_count: [80, 150]
    tone: semi_formal
    structure:
      - greeting
      - troubleshooting_steps
      - info_request
      - timeline
      - sign_off
```

