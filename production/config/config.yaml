## Intent Categories

```yaml
intent_categories:
  technical-integration:
    keywords: ["integration", "API", "SSO", "SAML", "webhook", "connect", "sync"]
    escalation_rules: [ESC-001, ESC-008]
    response_templates: [email-tech-neutral, webform-tech-neutral]

  billing:
    keywords: ["refund", "charged", "payment", "invoice", "transaction", "billing"]
    escalation_rules: [ESC-002]
    response_templates: [email-billing-frustrated]

  feature-request:
    keywords: ["feature request", "roadmap", "when will", "would be amazing", "wish"]
    escalation_rules: [ESC-010]
    response_templates: [email-feature-neutral]

  bug-report:
    keywords: ["bug", "not working", "broken", "error", "issue", "problem"]
    escalation_rules: [ESC-005]
    response_templates: [webform-tech-neutral, whatsapp-bug-angry]

  how-to:
    keywords: ["how do I", "how to", "can you help", "steps", "guide"]
    escalation_rules: []
    response_templates: [whatsapp-howto-neutral, email-howto-neutral]

  compliance:
    keywords: ["GDPR", "HIPAA", "SOC 2", "compliance", "legal", "regulation"]
    escalation_rules: [ESC-003]
    response_templates: [webform-compliance-formal]

  cancellation:
    keywords: ["cancel", "close account", "leaving", "churn"]
    escalation_rules: [ESC-009]
    response_templates: [email-cancellation-retention]

  sales:
    keywords: ["pricing", "quote", "enterprise", "demo", "sales"]
    escalation_rules: [ESC-001, ESC-007]
    response_templates: [email-sales-professional]

  account:
    keywords: ["account", "profile", "settings", "password", "login"]
    escalation_rules: []
    response_templates: [email-account-neutral]

  performance:
    keywords: ["slow", "performance", "lag", "loading", "speed"]
    escalation_rules: [ESC-005]
    response_templates: [webform-performance-neutral]
```
